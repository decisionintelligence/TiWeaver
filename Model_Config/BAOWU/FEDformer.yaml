log_base_dir: ./Run/baseline/logs/FEDformer
to_log_file: True
to_stdout: True
TB_dir: False
checkpoints: ./Run/baseline/checkpoints/FEDformer
log_level: INFO
model_name: FEDformer
time_mark: True

data:
  batch_size: 512
  split_dataset: [0.525, 0.175, 0.3] # 训练集、验证集、测试集的比例
  # interval: '3h'
  freq: '60s' # 'h'、'min'、's'
  data_name: BAOWU
  root_path: dataset    # 宝武数据集的目录
  data_path: merged_regular.csv # 60_LAV.csv  # 宝武数据集的文件名
  num_workers: 3
  embed: 0
  target_num: 1

model:
  seq_len: 336
  pred_len: 336
  main_dim: 1
  e_layers: 3
  d_layers: 1
  d_ff: 32
  d_model: 16
  dropout: 0.1
  moving_avg: 25
  activation: gelu
  enc_in: 7
  dec_in: 7
  c_out: 7
  n_heads: 8
  embed: timeF
  use_norm: True
  loss:
    pred_loss: True
    recon_loss: False
    criterion: mse

train:
  lr: 0.001
  lradj: 'default'
  epochs: 10
  pct_start: 0.4
  patience: 2
  log_every: 1

GPU:
  use_gpu: True
  gpu: 0
  use_multi_gpu: False
  devices: '0, 1, 2, 3'