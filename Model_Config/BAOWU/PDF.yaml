log_base_dir: ./Run/baseline/logs/PDF
to_log_file: True
to_stdout: True
TB_dir: False
checkpoints: ./Run/baseline/checkpoints/PDF
log_level: INFO
model_name: PDF


data:
  batch_size: 512
  split_dataset: [0.6, 0.2, 0.2] # 训练集、验证集、测试集的比例
  # interval: '3h'
  freq: '60s' # 'h'、'min'、's'
  data_name: BAOWU
  root_path: dataset    # 宝武数据集的目录
  data_path: merged_regular.csv # 60_LAV.csv  # 宝武数据集的文件名
  num_workers: 3
  embed: 0
  target_num: 1
  collate_fn: collate_fn
  missing_rate: 0.0
  
model:
  seq_len: 512
  pred_len: 512
  output_len: 4
  main_dim: 1
  add: True
  enc_in: 7
  c_in: 7
  wo_conv: False
  serial_conv: False
  patch_len: [1]
  kernel_list: [3, 7, 9, 11]
  period: [24]
  stride: [1]
  padding_patch: end
  revin: 1,
  affine: 0,
  subtract_last: 0
  d_ff: 16
  d_model: 4
  individual: False
  fc_dropout: 0.15
  dropout: 0.25
  head_dropout: 0
  num_nodes: 7
  e_layers: 3
  n_heads: 4
  num_experts_list: [4, 4, 4]
  revin: 1
  gpu: 0
  loss:
    pred_loss: True
    criterion: mse # mae

train:
  lr: 0.005
  lradj: 'TST'
  epochs: 30
  pct_start: 0.4
  patience: 5
  log_every: 1

GPU:
  use_gpu: True
  gpu: 0
  use_multi_gpu: False
  devices: '0, 1, 2, 3'