log_base_dir: ./Run/logs/Mamba
to_log_file: True
to_stdout: True
TB_dir: False
checkpoints: ./Run/checkpoints/Mamba
log_level: INFO
model_name: Mamba

data:
  batch_size: 128
  split_dataset: [0.525, 0.175, 0.3] # 训练集、验证集、测试集的比例
  # interval: '3h'
  freq: '60s' # 'h'、'min'、's'
  data_name: BAOWU
  root_path: dataset    # 宝武数据集的目录
  data_path: merged_regular.csv # 60_LAV.csv  # 宝武数据集的文件名
  num_workers: 3
  embed: 0
  target_num: 1

model:
  input_dim: 7
  seq_len: 336
  pred_len: 336
  main_dim: 1
  feature: 7
  e_layers: 1
  d_model: 512
  dropout: 0.1
  loss:
    pred_loss: True
    criterion: huber

train:
  lr: 0.0001
  lradj: 'default'
  epochs: 30
  pct_start: 0.4
  patience: 5
  log_every: 1

GPU:
  use_gpu: True
  gpu: 0
  use_multi_gpu: False
  devices: '0, 1, 2, 3'