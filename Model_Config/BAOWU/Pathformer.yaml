log_base_dir: ./Run/baseline/logs/Pathformer
to_log_file: True
to_stdout: True
TB_dir: False
checkpoints: ./Run/baseline/checkpoints/Pathformer
log_level: INFO
model_name: Pathformer


data:
  batch_size: 64
  split_dataset: [0.525, 0.175, 0.3] # 训练集、验证集、测试集的比例
  # interval: '3h'
  freq: '60s' # 'h'、'min'、's'
  data_name: BAOWU
  root_path: dataset    # 宝武数据集的目录
  data_path: merged_regular.csv # 60_LAV.csv  # 宝武数据集的文件名
  num_workers: 3
  embed: 0
  target_num: 1
  collate_fn: collate_fn
  missing_rate: 0.0

model:
  seq_len: 512
  pred_len: 512
  output_len: 4
  main_dim: 1
  batch_norm: 1
  d_ff: 16
  d_model: 2
  patch_size_list: [[56,28,12,24],[42,28,16,21],[56,16,28,42]]
  k: 2
  residual_connection: 1
  num_nodes: 7
  layer_nums: 3
  num_experts_list: [4, 4, 4]
  revin: 1
  gpu: 0
  loss:
    pred_loss: True
    criterion: mae # mae

train:
  lr: 0.0003
  lradj: 'TST'
  epochs: 30
  pct_start: 0.4
  patience: 5
  log_every: 1

GPU:
  use_gpu: True
  gpu: 0
  use_multi_gpu: False
  devices: '0, 1, 2, 3'