log_base_dir: ./Run/logs/ROSE
to_log_file: True
to_stdout: True
TB_dir: False
checkpoints: ./Run/checkpoints/ROSE
log_level: INFO
model_name: ROSE
exp_name: irregular_ROSE

data:
  batch_size: 64
  split_dataset: [0.6, 0.2, 0.2] # 训练集、验证集、测试集的比例
  freq: '60s' # 'h'、'min'、's'
  data_name: irregular
  root_path: dataset    # 宝武数据集的目录
  data_path: merged_regular.csv # 60_LAV.csv  # 宝武数据集的文件名
  num_workers: 3
  embed: 0
  target_num: 1
  collate_fn: collate_fn
  missing_rate: 0.0

model:
  seq_len: 512
  pred_len: 512
  main_dim: 1
  enc_in: 7
  head_type: 'prediction'
  num_slots: 8
  patch_len: 64
  batch_size: 32
  stride: 64
  n_embedding: 128 
  revin: 1 
  n_layers: 3 
  n_heads: 16 
  d_model: 256 # zero 128
  d_ff: 512 
  dropout: 0.2 
  head_dropout: 0.2 
  n_epochs_finetune: 20 
  pretrained_model: 'full-shot'
  one_channel: 0 
  freeze_embedding: 1
  zero_shot: 0
  loss:
    pred_loss: True
    criterion: mae # mae

train:
  lr: 0.0001
  lradj: 'default'
  num_epochs: 20
  freeze_epochs: 20
  pct_start: 0.3
  patience: 30
  log_every: 1

GPU:
  use_gpu: True
  gpu: 0
  use_multi_gpu: False
  devices: '0, 1, 2, 3'